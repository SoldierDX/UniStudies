</button>

<button class="hover:bg-white/10 px-4 py-2 rounded-xl transition-transform active:scale-95 font-bold text-lg Inter">

<div class="w-full max-w-[280px] aspect-square mb-lg flex items-center justify-center">

<h1 class="font-h1 text-white mb-sm">Qual é o seu objetivo?</h1>
<p class="font-body-md text-white/90">Vamos personalizar sua jornada de estudos</p>
</div>

<div class="flex gap-2 mb-xl items-center">
<div class="h-2 w-2 rounded-full bg-white/40"></div>
<div class="h-2 w-2 rounded-full bg-white/40"></div>
<div class="h-2 w-2 rounded-full bg-white/40"></div>
<div class="h-2 active-dot rounded-full"></div>
<div class="h-2 w-2 rounded-full bg-white/40"></div>
</div>
<!-- Options Section -->
<div class="w-full max-w-md space-y-md">
<!-- Option 1: Selected -->
<button class="w-full flex items-center p-md bg-white rounded-xl shadow-lg border-4 border-white active:scale-95 transition-all text-left ring-4 ring-white/20">
<div class="w-12 h-12 rounded-lg bg-secondary-container flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-primary" data-icon="rocket_launch">rocket_launch</span>
</div>
<span class="font-label-md text-on-surface text-lg">Aprender do zero</span>
<div class="ml-auto">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2 -->
<button class="w-full flex items-center p-md bg-white/10 backdrop-blur-sm border border-white/20 rounded-xl hover:bg-white/20 active:scale-95 transition-all text-left">

</div>
