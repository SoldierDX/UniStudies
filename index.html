<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniStudies – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C8201A;
    --red-dark: #a81813;
    --red-light: #fdecea;
    --bg: #fdf5f4;
    --text: #1a1a1a;
    --muted: #7a7a7a;
    --border: #e2e2e2;
    --white: #ffffff;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(200,32,26,0.08);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* subtle background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,32,26,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 100% 100%, rgba(200,32,26,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--white);
    border-radius: 28px;
    padding: 40px 32px 36px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .logo-img {
    width: 80px;
    height: auto;
    /* logo has black bg — clip to content */
    filter: drop-shadow(0 2px 8px rgba(200,32,26,0.18));
  }

  .logo-name {
    font-size: 26px;
    font-weight: 800;
    color: var(--red);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo-tagline {
    margin-top: 4px;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    align-content: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
    font-weight: 500;
  }

  /* ── Form ── */
  .form { display: flex; flex-direction: column; gap: 18px; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  label {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
  }

  .forgot {
    font-size: 13px;
    font-weight: 700;
    color: var(--red);
    text-decoration: none;
    transition: opacity .2s;
  }
  .forgot:hover { opacity: .75; }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 13px 44px 13px 15px;
    border: 1.8px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14.5px;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(200,32,26,0.10);
  }

  input::placeholder { color: #bbb; }

  .input-icon {
    position: absolute;
    right: 14px;
    color: #bbb;
    display: flex;
    align-items: center;
    pointer-events: none;
  }

  /* Password field active border */
  .input-wrap.active input {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(200,32,26,0.10);
  }

  /* ── CTA Button ── */
  .btn-login {
    margin-top: 4px;
    width: 100%;
    padding: 15px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.2px;
    transition: background .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(200,32,26,0.30);
  }

  .btn-login:hover {
    background: var(--red-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(200,32,26,0.38);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login svg { flex-shrink: 0; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Social Buttons ── */
  .social-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-social {
    padding: 12px 10px;
    border: 1.8px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  .btn-social:hover {
    border-color: #bbb;
    background: #fafafa;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  /* ── Footer ── */
  .footer-link {
    text-align: center;
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 500;
    padding-top: 4px;
  }

  .footer-link a {
    color: var(--red);
    font-weight: 800;
    text-decoration: none;
    transition: opacity .2s;
  }
  .footer-link a:hover { opacity: .75; }

  .logo-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    align-content: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <img
      class="logo-img"
      src="UniStudies logo.png"
      alt="UniStudies logo"
    >
    <div class="logo-box">
      <div class="logo-name">UniStudies</div>
      <div class="logo-tagline">Seu caminho como desenvolvedor<br>começa aqui</div>
    </div>
  </div>

  <!-- Form -->
  <form class="form" onsubmit="return false;">

    <!-- E-mail -->
    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="nome@exemplo.com" autocomplete="email">
        <span class="input-icon">
          <!-- envelope icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Senha -->
    <div class="field">
      <div class="field-header">
        <label for="senha">Senha</label>
        <a href="#" class="forgot">Esqueceu a senha?</a>
      </div>
      <div class="input-wrap active">
        <input type="password" id="senha" value="········" autocomplete="current-password">
        <span class="input-icon">
          <!-- lock icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Entrar -->
    <button class="btn-login" type="submit" onclick="login()">
      Entrar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>

    <!-- Divider -->
    <div class="divider">ou continue com</div>

    <!-- Social -->
    <div class="social-row">
      <button class="btn-social" type="button">
        <!-- monitor icon for Google -->
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <!-- code icon for GitHub -->
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        GitHub
      </button>
    </div>

    <!-- Register -->
    <p class="footer-link">Não tem conta? <a href="registration.html">Criar conta</a></p>

  </form>
</div>



<script>
  function login(){
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
  


    if (email === 'teste@teste.com' && senha === 'teste') {
      window.location.href = 'homepage.html';
      alert('Login realizado com sucesso');
    } else {
      alert('Email ou senha inválidos');
    }

    


  };


</script>

  

</body>
</html>
