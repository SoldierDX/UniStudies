<body class="bg-background text-on-background font-body-md min-h-screen pb-24">

<header class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 shadow-sm fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16">
<button class="text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg text-on-surface">Perfil</h1>
<button class="text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>

<main class="pt-20 px-margin space-y-xl">
<!-- Profile Header -->
<section class="flex flex-col items-center">
<div class="relative">
<div class="w-32 h-32 rounded-full bg-surface-container-highest border-4 border-white shadow-lg overflow-hidden">

<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white flex items-center justify-center transition-transform active:scale-90">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<div class="mt-md text-center">
<h2 class="font-h2 text-h2 text-on-surface">@dev_pedro</h2>
<div class="flex items-center justify-center gap-sm mt-xs">
<span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-md text-sm">Nível 5</span>
<span class="text-tertiary font-body-sm">•</span>
<span class="text-primary font-label-md">1200 XP</span>
</div>
</div>
</section>
<!-- Progresso Section (Gamified Stats) -->
<section class="space-y-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="insights">insights</span>
<h3 class="font-h3 text-h3">Progresso</h3>
</div>
<div class="bg-white p-md rounded-xl shadow-sm border border-outline-variant/30 space-y-md">
<div class="space-y-xs">
<div class="flex justify-between font-label-md text-sm">
<span>Próximo Nível</span>
<span class="text-primary">80%</span>
</div>
<div class="w-full h-3 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container" style="width: 80%"></div>
</div>
</div>
<div class="flex justify-between items-center pt-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-orange-500" data-icon="local_fire_department" data-weight="fill">local_fire_department</span>
<div class="flex flex-col">
<span class="font-body-sm text-tertiary">Streak</span>
<span class="font-label-md">15 dias</span>
</div>
</div>
<div class="h-8 w-px bg-outline-variant"></div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" data-icon="military_tech">military_tech</span>

<span class="font-body-sm text-tertiary">Total de XP</span>
<span class="font-label-md">1200</span>
</div>
</div>
</div>
<button class="w-full py-2 border-2 border-primary text-primary rounded-lg font-label-md hover:bg-primary/5 transition-colors active:scale-95">

</div>
</section>

<div class="flex items-center gap-sm">

</div>
<div class="space-y-md">
<div class="space-y-xs">

<input class="w-full px-md py-3 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="text" value="Pedro Silva"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-1">Email</label>
<input class="w-full px-md py-3 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="email" value="pedro.dev@email.com"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-1">Faculdade</label>
<input class="w-full px-md py-3 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="text" value="FIAP"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-1">Curso</label>
<input class="w-full px-md py-3 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="text" value="ADS"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant px-1">Período</label>
<input class="w-full px-md py-3 bg-white border border-outline-variant rounded-xl shadow-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="text" value="1º Semestre"/>
</div>
</div>
</section>
<!-- Segurança Section -->
<section class="space-y-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="lock">lock</span>

</div>

<span class="material-symbols-outlined text-tertiary" data-icon="password">password</span>
<span class="font-body-md">Alterar senha</span>
</div>
<span class="material-symbols-outlined text-tertiary" data-icon="chevron_right">chevron_right</span>
</button>
</section>

<section class="space-y-md pb-12">
<button class="w-full py-4 bg-primary text-white rounded-xl font-label-md text-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all">

<span class="material-symbols-outlined text-[20px]" data-icon="logout">logout</span>
